<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — CV Guard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{font-family:'Inter',sans-serif;}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.glass{background:rgba(255,255,255,.07);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.13);}
.input-field{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);color:#f1f5f9;transition:all .25s;width:100%;}
.input-field:focus{border-color:#7c3aed;background:rgba(124,58,237,.1);outline:none;box-shadow:0 0 0 3px rgba(124,58,237,.2);}
.input-field::placeholder{color:rgba(255,255,255,.4);}
.input-field:disabled{opacity:.4;cursor:not-allowed;}
.input-field option{background:#1e1040;color:#f1f5f9;}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#4f46e5);transition:all .3s;color:#fff;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(124,58,237,.45);}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.28;pointer-events:none;}
.slide-in{animation:slideIn .5s ease forwards;}
@keyframes slideIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.flash-ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#86efac;}
.flash-err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.field-label{display:block;font-size:13px;font-weight:500;margin-bottom:8px;color:rgba(255,255,255,.7);}
.select-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
</style>
</head>
<body>
  <div class="orb w-96 h-96 bg-purple-600" style="top:-60px;right:-60px;"></div>
  <div class="orb w-72 h-72 bg-blue-500" style="bottom:-40px;left:-40px;"></div>

  <div class="relative z-10 w-full max-w-md slide-in my-6">
    <div class="text-center mb-7">
      <div class="inline-flex items-center justify-center w-18 h-18 rounded-2xl shadow-2xl mb-3 p-4" style="background:linear-gradient(135deg,#7c3aed,#4f46e5)">
        <i class="fas fa-user-plus text-3xl text-white"></i>
      </div>
      <h1 class="text-3xl font-black text-white mt-1">Create Account</h1>
      <p class="text-sm mt-1 text-purple-300">Join CV Guard today</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat,msg in messages %}
      <div class="mb-4 px-4 py-3 rounded-xl text-sm font-medium {% if cat=='error' %}flash-err{% else %}flash-ok{% endif %}">
        <i class="fas {% if cat=='error' %}fa-circle-exclamation{% else %}fa-circle-check{% endif %} mr-2"></i>{{ msg }}
      </div>
      {% endfor %}
    {% endwith %}

    <div class="glass rounded-3xl p-8 shadow-2xl">
      <form method="POST" action="{{ url_for('register') }}" class="space-y-4">
        <!-- Name -->
        <div>
          <label class="field-label">Full Name</label>
          <div class="relative">
            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-sm" style="color:rgba(255,255,255,.4)"></i>
            <input type="text" name="name" required placeholder="Muhammad Ali" class="input-field pl-11 pr-4 py-3 rounded-xl text-sm">
          </div>
        </div>
        <!-- Email -->
        <div>
          <label class="field-label">Email Address</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-sm" style="color:rgba(255,255,255,.4)"></i>
            <input type="email" name="email" required placeholder="you@example.com" class="input-field pl-11 pr-4 py-3 rounded-xl text-sm">
          </div>
        </div>
        <!-- Location -->
        <div>
          <label class="field-label"><i class="fas fa-location-dot text-purple-400 mr-1.5"></i>Your Location <span style="color:rgba(255,255,255,.35);font-size:11px">(for job priority ranking)</span></label>
          <div class="space-y-2">
            <select id="reg_country" onchange="updateRegProv()" class="input-field px-4 py-3 rounded-xl text-sm">
              <option value="">🌍 Select Country</option>
            </select>
            <select id="reg_prov" onchange="updateRegCity()" disabled class="input-field px-4 py-3 rounded-xl text-sm">
              <option value="">Select Province / State</option>
            </select>
            <select name="city" id="reg_city" disabled class="input-field px-4 py-3 rounded-xl text-sm">
              <option value="">Select City</option>
            </select>
          </div>
        </div>
        <!-- Password -->
        <div>
          <label class="field-label">Password</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-sm" style="color:rgba(255,255,255,.4)"></i>
            <input type="password" name="password" required id="regPw" placeholder="Min. 6 characters" class="input-field pl-11 pr-11 py-3 rounded-xl text-sm">
            <button type="button" onclick="togglePw()" class="absolute right-4 top-1/2 -translate-y-1/2" style="color:rgba(255,255,255,.4)">
              <i class="fas fa-eye text-sm" id="regEye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary w-full py-3.5 rounded-xl font-semibold text-sm">
          <i class="fas fa-rocket mr-2"></i>Create Account
        </button>
      </form>
      <div class="mt-5 text-center">
        <p class="text-sm" style="color:rgba(255,255,255,.5)">Already have an account?
          <a href="{{ url_for('login') }}" class="text-purple-400 hover:text-purple-300 font-semibold ml-1 transition-colors">Sign In</a>
        </p>
      </div>
    </div>
  </div>

<script>
const LD={"Pakistan":{"Punjab":["Rawalpindi","Islamabad","Lahore","Faisalabad","Multan","Gujranwala","Sialkot","Bahawalpur","Sargodha","Wah Cantt","Taxila","Chakwal","Jhelum","Attock","Gujrat","Hafizabad","Narowal","Sheikhupura","Chiniot","Okara","Kasur","Sahiwal","Mianwali","Khushab"],"Khyber Pakhtunkhwa":["Peshawar","Abbottabad","Mansehra","Mardan","Swat","Kohat","Dera Ismail Khan","Nowshera","Charsadda","Bannu","Haripur","Swabi","Buner","Dir","Chitral","Malakand"],"Sindh":["Karachi","Hyderabad","Sukkur","Larkana","Nawabshah","Mirpur Khas","Jacobabad","Shikarpur","Dadu","Khairpur","Badin","Thatta","Matiari"],"Balochistan":["Quetta","Gwadar","Turbat","Khuzdar","Hub","Chaman","Zhob","Sibi","Loralai","Kalat","Nushki"],"Azad Kashmir":["Muzaffarabad","Mirpur","Rawalakot","Kotli","Bagh","Haveli","Neelum"],"Gilgit-Baltistan":["Gilgit","Skardu","Hunza","Ghizer","Astore","Ghanche"],"ICT":["Islamabad"]},"India":{"Delhi":["New Delhi","Delhi"],"Maharashtra":["Mumbai","Pune","Nagpur","Nashik","Aurangabad"],"Karnataka":["Bangalore","Mysore","Hubli","Mangalore"],"Tamil Nadu":["Chennai","Coimbatore","Madurai","Salem"],"Uttar Pradesh":["Lucknow","Kanpur","Agra","Varanasi","Meerut"],"Telangana":["Hyderabad","Warangal"],"Gujarat":["Ahmedabad","Surat","Vadodara","Rajkot"]},"United Kingdom":{"England":["London","Manchester","Birmingham","Leeds","Liverpool","Bristol","Sheffield","Newcastle","Leicester","Coventry"],"Scotland":["Edinburgh","Glasgow","Aberdeen","Dundee"],"Wales":["Cardiff","Swansea","Newport"],"Northern Ireland":["Belfast","Derry"]},"United States":{"California":["Los Angeles","San Francisco","San Diego","San Jose","Sacramento"],"New York":["New York City","Buffalo","Rochester","Albany"],"Texas":["Houston","Dallas","Austin","San Antonio","Fort Worth"],"Florida":["Miami","Orlando","Tampa","Jacksonville"],"Washington":["Seattle","Spokane","Tacoma","Bellevue","Redmond"]},"UAE":{"Dubai":["Dubai","Jebel Ali","Business Bay"],"Abu Dhabi":["Abu Dhabi","Al Ain","Khalifa City"],"Sharjah":["Sharjah"],"Ajman":["Ajman"],"Ras Al Khaimah":["Ras Al Khaimah"],"Fujairah":["Fujairah"]},"Saudi Arabia":{"Riyadh Region":["Riyadh","Kharj","Diriyah"],"Makkah Region":["Mecca","Jeddah","Taif"],"Madinah Region":["Medina","Yanbu"],"Eastern Province":["Dammam","Al Khobar","Dhahran","Jubail","Al Ahsa"]},"Canada":{"Ontario":["Toronto","Ottawa","Mississauga","Hamilton","Brampton","Kitchener"],"British Columbia":["Vancouver","Victoria","Kelowna","Surrey"],"Quebec":["Montreal","Quebec City","Laval","Gatineau"],"Alberta":["Calgary","Edmonton","Red Deer","Lethbridge"]},"Australia":{"New South Wales":["Sydney","Newcastle","Wollongong","Canberra"],"Victoria":["Melbourne","Geelong","Ballarat"],"Queensland":["Brisbane","Gold Coast","Sunshine Coast","Townsville"],"Western Australia":["Perth","Fremantle","Bunbury"]},"Germany":{"Bavaria":["Munich","Nuremberg","Augsburg"],"Berlin":["Berlin"],"Hamburg":["Hamburg"],"North Rhine-Westphalia":["Cologne","Dusseldorf","Dortmund","Essen","Bonn"]}};

window.addEventListener('DOMContentLoaded',()=>{
  const cs=document.getElementById('reg_country');
  Object.keys(LD).sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cs.appendChild(o);});
  cs.value='Pakistan'; updateRegProv();
});
function updateRegProv(){
  const c=document.getElementById('reg_country').value;
  const ps=document.getElementById('reg_prov'),cs=document.getElementById('reg_city');
  ps.innerHTML='<option value="">Select Province / State</option>';
  cs.innerHTML='<option value="">Select City</option>';cs.disabled=true;
  if(c&&LD[c]){ps.disabled=false;Object.keys(LD[c]).sort().forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;ps.appendChild(o);});}
  else ps.disabled=true;
}
function updateRegCity(){
  const c=document.getElementById('reg_country').value,p=document.getElementById('reg_prov').value;
  const cs=document.getElementById('reg_city');
  cs.innerHTML='<option value="">Select City</option>';
  if(c&&p&&LD[c]?.[p]){cs.disabled=false;LD[c][p].sort().forEach(ci=>{const o=document.createElement('option');o.value=ci;o.textContent=ci;cs.appendChild(o);});}
  else cs.disabled=true;
}
function togglePw(){const p=document.getElementById('regPw'),e=document.getElementById('regEye');p.type=p.type==='password'?'text':'password';e.className=p.type==='text'?'fas fa-eye-slash text-sm':'fas fa-eye text-sm';}
</script>
</body>
</html>
